<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Directory</title>

    <!-- ── Standard browser tab icon ── -->
    <link rel="icon" type="image/png" href="IMG_0572.png">

    <!-- ── iOS home screen icon (what appears when saved to iPhone home screen) ── -->
    <link rel="apple-touch-icon" href="IMG_0572.png">

    <!-- ── Android / Chrome home screen icon ── -->
    <link rel="manifest" href="manifest.json">

    <!-- ── iOS: removes the Safari browser chrome when opened from home screen ── -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Client Directory">

    <!-- ── Theme color (colors the browser bar on Android) ── -->
    <meta name="theme-color" content="#1a3a4a">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="IMG_0572.png" alt="Client Directory Logo" class="header-logo"
             onerror="this.style.display='none'">
        <h1>Client Directory</h1>
        <p>Business Management Portal</p>
    </header>

    <main>
        <section class="form-section">
            <h2>Add New Business</h2>

            <div class="form-grid">
                <div class="field-group">
                    <label for="businessName">Business Name <span class="required">*</span></label>
                    <input id="businessName" type="text" placeholder="e.g. Bright Path Accounting">
                </div>
                <div class="field-group">
                    <label for="businessType">Industry / Type <span class="required">*</span></label>
                    <input id="businessType" type="text" placeholder="e.g. Accounting Firm">
                </div>
                <div class="field-group">
                    <label for="city">City <span class="required">*</span></label>
                    <input id="city" type="text" placeholder="e.g. Atlanta">
                </div>
                <div class="field-group">
                    <label for="state">State <span class="required">*</span></label>
                    <input id="state" type="text" placeholder="e.g. GA">
                </div>
                <div class="field-group">
                    <label for="phone">Phone Number</label>
                    <input id="phone" type="tel" placeholder="e.g. 404-555-1001">
                </div>
                <div class="field-group">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" placeholder="e.g. info@business.com">
                </div>
                <div class="field-group full">
                    <label for="website">Website</label>
                    <input id="website" type="url" placeholder="e.g. https://business.com">
                </div>
                <div class="field-group full">
                    <label for="servicesOffered">Services Offered</label>
                    <textarea id="servicesOffered" rows="3"
                        placeholder="e.g. Bookkeeping, tax preparation, payroll reports"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button id="submitBtn" onclick="addBusiness()">Add Business</button>
                <button class="btn-ghost" onclick="clearForm()">Clear</button>
            </div>

            <div id="formMessage"></div>
        </section>
    </main>

    <footer>
        <p>Client Directory &copy; 2025 &nbsp;&middot;&nbsp; Private &amp; Secure</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
